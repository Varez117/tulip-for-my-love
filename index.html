<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Core v5 - Stronger Magnetism</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Consolas', monospace; }
        canvas { display: block; }
        
        #input_video {
            position: absolute; bottom: 20px; right: 20px;
            width: 160px; height: 120px;
            z-index: 2; border-radius: 8px;
            transform: scaleX(-1);
            border: 1px solid #333; opacity: 0.4;
            transition: opacity 0.3s;
        }
        #input_video:hover { opacity: 1; }

        #ui-layer {
            position: absolute; top: 20px; left: 20px; z-index: 3;
            color: rgba(0, 255, 255, 0.7); pointer-events: none;
        }
        h1 { margin: 0; font-size: 1rem; letter-spacing: 2px; border-bottom: 1px solid rgba(0,255,255,0.3); padding-bottom: 5px; display: inline-block;}
        .status { font-size: 0.8rem; margin-top: 8px; }

        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #0ff; font-size: 1.2rem;
        }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading">BOOSTING MAGNETIC FIELD...</div>
    <div id="ui-layer">
        <h1>STABLE CORE + BOOSTED MAGNETISM</h1>
        <div class="status" id="status-text">SYSTEM IDLE</div>
        <div class="status" id="debug-depth">TRACKING: OFF</div>
    </div>
    <video id="input_video"></video>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        attribute float aSize;
        varying vec3 vPos;

        void main() {
            vec3 pos = position;

            // Rotación idle interna
            float angle = uTime * 0.1; 
            float s = sin(angle); float c = cos(angle);
            float x = pos.x * c - pos.y * s;
            float y = pos.x * s + pos.y * c;
            pos.x = x; pos.y = y;

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            gl_PointSize = (5.0 * aSize) * (50.0 / -mvPosition.z);
            vPos = position; 
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vPos;
        
        void main() {
            vec2 coord = gl_PointCoord - vec2(0.5);
            float dist = length(coord);
            if(dist > 0.5) discard;

            vec3 n = normalize(vPos);
            vec3 color = vec3(0.0, 0.6, 1.0); // Azul Cian
            
            color += vec3(0.0, 0.5, 0.1) * max(0.0, n.y); // Verde Arriba
            color += vec3(0.6, 0.0, 0.1) * max(0.0, -n.y); // Rojo Abajo
            color += vec3(0.3, 0.3, 0.3) * max(0.0, n.z); // Blanco Frente

            float strength = 1.0 - (dist * 2.0);
            strength = pow(strength, 2.0);

            gl_FragColor = vec4(color, strength * 0.9);
        }
    </script>

    <script>
        // --- CONFIGURACIÓN AJUSTADA ---
        const config = {
            // ROTACIÓN: Se mantiene estable y lenta (anti-tics)
            rotLerp: 0.06,  
            
            // MOVIMIENTO: Aumentado ligeramente de 0.008 a 0.015
            // Esto da un magnetismo más fuerte pero sigue siendo pesado.
            posLerp: 0.015,  
            
            rangeX: 60, 
            rangeY: 35,
            baseZ: -10,
            minZ: -50,
            maxZ: 80
        };

        const state = {
            targetQuat: new THREE.Quaternion(),
            currentQuat: new THREE.Quaternion(),
            targetPos: new THREE.Vector3(0, 0, config.baseZ),
            currentPos: new THREE.Vector3(0, 0, config.baseZ),
            handDetected: false
        };

        // --- THREE.JS ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.010);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 70;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- ESFERA ---
        const geometry = new THREE.BufferGeometry();
        const count = 30000;
        const positions = [];
        const sizes = [];
        const radius = 12;

        for(let i=0; i<count; i++) {
            const phi = Math.acos(1 - 2 * (i + 0.5) / count);
            const theta = Math.PI * (1 + Math.sqrt(5)) * i;
            
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);
            
            positions.push(x, y, z);
            sizes.push(0.5 + Math.random());
        }

        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute('aSize', new THREE.Float32BufferAttribute(sizes, 1));

        const material = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            uniforms: { uTime: { value: 0 } },
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const sphere = new THREE.Points(geometry, material);
        scene.add(sphere);

        // --- LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.uTime.value = clock.getElapsedTime();

            if (state.handDetected) {
                // Rotación suave
                state.currentQuat.slerp(state.targetQuat, config.rotLerp);
                sphere.quaternion.copy(state.currentQuat);

                // Movimiento con magnetismo aumentado
                state.currentPos.lerp(state.targetPos, config.posLerp);
                sphere.position.copy(state.currentPos);
                
            } else {
                // Idle: Retorno muy lento
                sphere.rotation.y += 0.001; 
                state.targetPos.set(0, 0, config.baseZ);
                state.currentPos.lerp(state.targetPos, 0.002);
                sphere.position.copy(state.currentPos);
            }

            renderer.render(scene, camera);
        }
        animate();

        // --- MATEMÁTICAS ---
        const vWrist = new THREE.Vector3();
        const vIndex = new THREE.Vector3();
        const vPinky = new THREE.Vector3();
        
        const vA = new THREE.Vector3();
        const vB = new THREE.Vector3();
        const vNormal = new THREE.Vector3(); 
        const vUp = new THREE.Vector3();     
        const vRight = new THREE.Vector3();  
        
        const mRotation = new THREE.Matrix4();
        const qDummy = new THREE.Quaternion();

        // --- MEDIAPIPE ---
        const els = {
            loading: document.getElementById('loading'),
            status: document.getElementById('status-text'),
            debug: document.getElementById('debug-depth')
        };

        function onResults(results) {
            els.loading.style.display = 'none';

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];

                if(!state.handDetected) {
                    state.handDetected = true;
                    els.status.innerText = "MAGNETIC LINK ENGAGED";
                    els.status.style.color = "#0ff";
                    sphere.quaternion.copy(state.currentQuat); 
                }

                // --- POSICIÓN ---
                const handSize = Math.hypot(lm[0].x - lm[9].x, lm[0].y - lm[9].y);
                let targetZ = THREE.MathUtils.mapLinear(handSize, 0.05, 0.50, config.minZ, config.maxZ);
                let x = (0.5 - lm[9].x) * config.rangeX * 2.5; 
                let y = (0.5 - lm[9].y) * config.rangeY * 2.0;

                // Deadzones de posición
                if (Math.abs(targetZ - state.targetPos.z) > 1.0) state.targetPos.z = targetZ;
                if (Math.abs(x - state.targetPos.x) > 0.5) state.targetPos.x = x;
                if (Math.abs(y - state.targetPos.y) > 0.5) state.targetPos.y = y;

                // UI Debug
                if (state.currentPos.z > 65) {
                    els.debug.innerText = "STATUS: INSIDE CORE";
                    els.debug.style.color = "#f0f";
                } else {
                    els.debug.innerText = `FIELD STRENGTH: BOOSTED`;
                    els.debug.style.color = "rgba(0, 255, 255, 0.7)";
                }

                // --- ROTACIÓN OMNI CON FILTRO ANTI-TIC ---
                const zMult = 1.5; 
                vWrist.set(-lm[0].x, -lm[0].y, lm[0].z * zMult);
                vIndex.set(-lm[5].x, -lm[5].y, lm[5].z * zMult);
                vPinky.set(-lm[17].x, -lm[17].y, lm[17].z * zMult);

                vA.subVectors(vIndex, vWrist).normalize();
                vB.subVectors(vPinky, vWrist).normalize();
                vNormal.crossVectors(vA, vB).normalize();

                vUp.copy(vA);
                vRight.crossVectors(vUp, vNormal).normalize();
                vUp.crossVectors(vNormal, vRight).normalize();

                mRotation.makeBasis(vRight, vUp, vNormal);
                qDummy.setFromRotationMatrix(mRotation);
                
                // Filtro de ángulo muerto (Anti-tics)
                if (state.targetQuat.angleTo(qDummy) > 0.04) {
                    state.targetQuat.copy(qDummy);
                }

            } else {
                if(state.handDetected) {
                    state.handDetected = false;
                    els.status.innerText = "SEARCHING SIGNAL...";
                    els.status.style.color = "#555";
                    els.debug.innerText = "TRACKING: OFF";
                }
            }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        hands.onResults(onResults);

        const cameraUtils = new Camera(document.getElementById('input_video'), {
            onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
            width: 640, height: 480
        });
        cameraUtils.start();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
