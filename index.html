<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Tulipán para Ti</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050005; 
            font-family: 'Consolas', monospace; 
            color: #fff;
        }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute; 
            top: 30px; 
            left: 30px; 
            z-index: 10;
            color: rgba(255, 150, 200, 0.8); 
            pointer-events: none;
        }
        h1 { 
            margin: 0; 
            font-size: 1.2rem; 
            letter-spacing: 3px; 
            border-bottom: 1px solid rgba(255, 150, 200, 0.3); 
            padding-bottom: 8px; 
            display: inline-block;
            font-weight: normal;
        }
        .status { 
            font-size: 0.85rem; 
            margin-top: 10px; 
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.3s ease;
        }

        #input_video {
            position: absolute; 
            bottom: 30px; 
            right: 30px;
            width: 160px; 
            height: 120px;
            z-index: 2; 
            border-radius: 12px;
            transform: scaleX(-1);
            border: 2px solid rgba(255, 150, 200, 0.3); 
            opacity: 0.5;
            transition: opacity 0.3s, box-shadow 0.3s;
            box-shadow: 0 0 15px rgba(255, 100, 150, 0.2);
            object-fit: cover;
        }
        #input_video:hover { 
            opacity: 1; 
            box-shadow: 0 0 20px rgba(255, 100, 150, 0.5);
        }

        #manual-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(20, 0, 15, 0.8);
            padding: 15px 25px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 150, 200, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 80%;
            max-width: 350px;
            opacity: 0;
            transition: opacity 1s ease;
        }
        #manual-controls.show {
            display: flex;
            opacity: 1;
        }
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8rem;
            letter-spacing: 1px;
            font-family: 'SF Pro Display', 'Helvetica Neue', sans-serif;
        }
        .control-group label { width: 120px; text-align: right; margin-right: 15px;}
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer;
            background: rgba(255, 150, 200, 0.2);
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 16px; width: 16px; border-radius: 50%;
            background: #ff96c8;
            cursor: pointer; -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(255, 100, 150, 0.8);
            transition: background 0.2s;
        }
        input[type=range]::-webkit-slider-thumb:hover { background: #fff; }
        
        input[type=checkbox] {
            width: 18px; height: 18px;
            accent-color: #ff96c8;
            cursor: pointer;
        }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>UN TULIPÁN DIGITAL</h1>
        <div class="status" id="status-text">Iniciando esencia...</div>
    </div>

    <video id="input_video" autoplay playsinline></video>

    <div id="manual-controls">
        <div class="control-group">
            <label>Girar</label>
            <input type="range" id="slider-rot" min="-3.14" max="3.14" step="0.01" value="0">
        </div>
        <div class="control-group">
            <label>Iz q | Der</label>
            <input type="range" id="slider-x" min="-80" max="80" step="0.1" value="0">
        </div>
        <div class="control-group">
            <label>Abajo | Arriba</label>
            <input type="range" id="slider-y" min="-60" max="60" step="0.1" value="0">
        </div>
        <div class="control-group">
            <label>Acercar</label>
            <input type="range" id="slider-z" min="-10" max="45" step="0.1" value="0">
        </div>
        <div class="control-group">
            <label>Activar Florecimiento</label>
            <input type="checkbox" id="checkbox-seed">
        </div>
    </div>

    <script id="vertexShader" type="x-shader/x-vertex">
        attribute float aSize;
        attribute float aSeed; 
        varying vec3 vPos;
        
        uniform float uTime;
        uniform vec3 uVelocity; 
        uniform float uSwarmStrength; 
        uniform float uCollapse; 

        void main() {
            vec3 pos = position;

            // --- LA SEMILLA (uCollapse = 1.0) ---
            float theta = aSeed * 6.28318 * 100.0;
            float phi = acos((aSeed * 2.0) - 1.0);
            float r = aSize * 2.0;

            vec3 seedPos = vec3(
                r * sin(phi) * cos(theta + uTime * 2.0),
                r * cos(phi),
                r * sin(phi) * sin(theta + uTime * 2.0)
            );
            
            // Interpolación Flor <-> Semilla
            pos = mix(pos, seedPos, uCollapse);

            // --- FÍSICAS DE ENJAMBRE ---
            float physicsMask = 1.0 - (uCollapse * 0.8); 

            vec3 beeMotion = vec3(
                sin(uTime * 3.0 + aSeed * 10.0),
                cos(uTime * 3.5 + aSeed * 12.0),
                sin(uTime * 2.8 + aSeed * 8.0)
            ) * aSize * 0.8;

            float individualDrag = 0.02 + pow(aSeed, 3.0) * 2.5; 
            vec3 beeTrail = uVelocity * individualDrag * aSize * 0.1;

            pos += (beeMotion - beeTrail) * uSwarmStrength * physicsMask;

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            gl_PointSize = (4.0 * aSize) * (50.0 / -mvPosition.z);
            vPos = position; 
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vPos;
        uniform float uCollapse; 
        
        void main() {
            vec2 coord = gl_PointCoord - vec2(0.5);
            float dist = length(coord);
            if(dist > 0.5) discard; 

            vec3 color;

            if (vPos.y < 0.0 && length(vPos.xz) < 5.0) {
                color = vec3(0.2, 0.8, 0.3);
            } else if (vPos.y >= 0.0 && vPos.y <= 18.0 && length(vPos.xz) < 15.0) {
                float h = vPos.y / 18.0; 
                vec3 baseColor = vec3(1.0, 0.1, 0.4); 
                vec3 topColor = vec3(1.0, 0.6, 0.8);  
                color = mix(baseColor, topColor, h);
            } else {
                color = vec3(1.0, 0.9, 0.7);
            }

            vec3 glowingSeedColor = vec3(1.0, 0.9, 0.5); 
            color = mix(color, glowingSeedColor, uCollapse);

            float strength = 1.0 - (dist * 2.0);
            strength = pow(strength, 1.5);

            gl_FragColor = vec4(color, strength * 0.85);
        }
    </script>

    <script>
        let controlMode = 'auto'; 
        const els = {
            status: document.getElementById('status-text'),
            manual: document.getElementById('manual-controls'),
            video: document.getElementById('input_video'),
            sliderRot: document.getElementById('slider-rot'),
            sliderX: document.getElementById('slider-x'),
            sliderY: document.getElementById('slider-y'),
            sliderZ: document.getElementById('slider-z'),
            checkSeed: document.getElementById('checkbox-seed')
        };

        const state = {
            targetPos: new THREE.Vector3(0, 0, 0),
            currentPos: new THREE.Vector3(0, 0, 0),
            targetQuat: new THREE.Quaternion(),
            currentQuat: new THREE.Quaternion(),
            
            handDetected: false,
            lerpPos: 0.015, 
            lerpRot: 0.02,
            
            prevPos: new THREE.Vector3(0, 0, 0), 
            currentVelocity: new THREE.Vector3(0, 0, 0),
            
            // INICIO EN SEMILLA (1.0)
            targetCollapse: 1.0, 
            currentCollapse: 1.0 
        };

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050005, 0.005);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 65; camera.position.y = 5;
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const starsGeometry = new THREE.BufferGeometry();
        const starsPositions = [];
        for(let i = 0; i < 2000; i++) {
            starsPositions.push((Math.random()-0.5)*400, (Math.random()-0.5)*400, (Math.random()-0.5)*300-50);
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsPositions, 3));
        const starField = new THREE.Points(starsGeometry, new THREE.PointsMaterial({color: 0xffe6f0, size: 0.8, transparent: true, opacity: 0.8, sizeAttenuation: true}));
        scene.add(starField);

        const geometry = new THREE.BufferGeometry();
        const positions = []; const sizes = []; const seeds = []; 
        for(let i = 0; i < 5000; i++) {
            let t = Math.random(); let y = -25 + 25 * t; let angle = Math.random() * Math.PI * 2; let r = 0.5 + Math.random() * 0.2;
            positions.push(r * Math.cos(angle), y, r * Math.sin(angle)); sizes.push(0.3 + Math.random() * 0.5); seeds.push(Math.random()); 
        }
        for(let i = 0; i < 30000; i++) {
            let h = Math.random(); let theta = Math.random() * Math.PI * 2; let rBase = 9 * Math.pow(h, 0.4) * (1.1 - h);
            let r = rBase * (1 + 0.15 * Math.sin(3 * theta)); let x = r * Math.cos(theta); let z = r * Math.sin(theta); let y = h * 18; 
            positions.push(x + (Math.random()-0.5)*0.6, y + (Math.random()-0.5)*0.6, z + (Math.random()-0.5)*0.6);
            sizes.push(0.5 + Math.random() * 0.8); seeds.push(Math.random()); 
        }
        for(let i = 0; i < 5000; i++) {
            let r = 15 + Math.random() * 25; let theta = Math.random() * Math.PI * 2; let phi = Math.acos((Math.random()*2)-1);
            positions.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta) - 5, r * Math.cos(phi));
            sizes.push(Math.random() * 0.6); seeds.push(Math.random()); 
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute('aSize', new THREE.Float32BufferAttribute(sizes, 1));
        geometry.setAttribute('aSeed', new THREE.Float32BufferAttribute(seeds, 1)); 

        const material = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            uniforms: { uTime: { value: 0 }, uVelocity: { value: new THREE.Vector3(0, 0, 0) }, uSwarmStrength: { value: 1.0 }, uCollapse: { value: 1.0 } },
            transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
        });
        const tulip = new THREE.Points(geometry, material);
        scene.add(tulip);

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime(); const dt = clock.getDelta(); 
            state.currentPos.lerp(state.targetPos, state.lerpPos);
            state.currentQuat.slerp(state.targetQuat, state.lerpRot);
            state.currentCollapse = THREE.MathUtils.lerp(state.currentCollapse, state.targetCollapse, 0.06);
            material.uniforms.uCollapse.value = state.currentCollapse;
            if (dt > 0) {
                let rawVel = new THREE.Vector3().subVectors(state.currentPos, state.prevPos).divideScalar(dt);
                if (rawVel.length() > 20) rawVel.setLength(20);
                state.currentVelocity.lerp(rawVel, 0.08);
            }
            material.uniforms.uTime.value = time;
            material.uniforms.uVelocity.value.copy(state.currentVelocity);
            tulip.position.set(state.currentPos.x, state.currentPos.y + Math.sin(time * 0.8) * 1.5, state.currentPos.z);
            if (controlMode === 'auto' && state.handDetected) {
                tulip.quaternion.copy(state.currentQuat);
            } else if (controlMode === 'manual') {
                tulip.quaternion.copy(state.currentQuat);
            } else { tulip.rotation.y += 0.002; }
            starField.position.x = -state.currentPos.x * 0.05;
            starField.position.y = -state.currentPos.y * 0.05;
            state.prevPos.copy(state.currentPos);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        els.sliderRot.addEventListener('input', (e) => { state.targetQuat.setFromEuler(new THREE.Euler(0, parseFloat(e.target.value), 0)); });
        els.sliderX.addEventListener('input', (e) => { state.targetPos.x = parseFloat(e.target.value); });
        els.sliderY.addEventListener('input', (e) => { state.targetPos.y = parseFloat(e.target.value); });
        els.sliderZ.addEventListener('input', (e) => { state.targetPos.z = parseFloat(e.target.value); });
        
        // CHECKBOX: Invertido para que activar florecimiento sea targetCollapse = 0
        els.checkSeed.addEventListener('change', (e) => {
            state.targetCollapse = e.target.checked ? 0.0 : 1.0;
        });

        function activateManualMode(message) {
            if (controlMode === 'manual') return;
            controlMode = 'manual'; els.status.innerText = message;
            els.video.style.display = 'none'; els.manual.classList.add('show');
            state.targetPos.set(0, 0, 0); state.targetQuat.setFromEuler(new THREE.Euler(0, 0, 0)); 
            state.currentVelocity.set(0, 0, 0);
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        hands.onResults((results) => {
            if (controlMode === 'manual') { controlMode = 'auto'; els.manual.classList.remove('show'); els.video.style.display = 'block'; }
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                if(!state.handDetected) {
                    state.handDetected = true; state.prevPos.copy(state.currentPos);
                }
                const palmBaseDist = Math.hypot(lm[9].x - lm[0].x, lm[9].y - lm[0].y);
                const avgTipDist = (Math.hypot(lm[8].x - lm[0].x, lm[8].y - lm[0].y) + Math.hypot(lm[12].x - lm[0].x, lm[12].y - lm[0].y) + Math.hypot(lm[16].x - lm[0].x, lm[16].y - lm[0].y) + Math.hypot(lm[20].x - lm[0].x, lm[20].y - lm[0].y)) / 4;
                const handOpenness = avgTipDist / (palmBaseDist + 0.0001);

                // LÓGICA INVERSA: handOpenness > 1.5 significa palma abierta -> FLORECER (0.0)
                if (handOpenness > 1.5) {
                    state.targetCollapse = 0.0;
                    els.status.innerText = "Floreciendo para ti...";
                    els.status.style.color = "#ff96c8";
                } else {
                    state.targetCollapse = 1.0;
                    els.status.innerText = "Resguardando la esencia...";
                    els.status.style.color = "#fff0a0";
                }

                state.targetPos.set(
                    THREE.MathUtils.clamp((0.5 - lm[9].x) * 140, -80, 80),
                    THREE.MathUtils.clamp((0.5 - lm[9].y) * 100, -60, 60),
                    THREE.MathUtils.clamp(THREE.MathUtils.mapLinear(handOpenness, 1.3, 2.5, -5, 45), -10, 50)
                );

                const vWrist = new THREE.Vector3(-lm[0].x, -lm[0].y, lm[0].z);
                const vIndex = new THREE.Vector3(-lm[5].x, -lm[5].y, lm[5].z);
                const vPinky = new THREE.Vector3(-lm[17].x, -lm[17].y, lm[17].z);
                const vMid = new THREE.Vector3(-lm[9].x, -lm[9].y, lm[9].z);
                const xAxis = new THREE.Vector3().subVectors(vPinky, vIndex).normalize();
                const yAxis = new THREE.Vector3().subVectors(vMid, vWrist).normalize();
                const zAxis = new THREE.Vector3().crossVectors(xAxis, yAxis).normalize();
                xAxis.crossVectors(yAxis, zAxis).normalize();
                state.targetQuat.setFromRotationMatrix(new THREE.Matrix4().makeBasis(xAxis, yAxis, zAxis));
            } else {
                if(state.handDetected) {
                    state.handDetected = false; els.status.innerText = "Abre tu palma para florecer...";
                    els.status.style.color = "rgba(255, 255, 255, 0.6)";
                    state.targetPos.set(0, 0, 0); state.targetQuat.setFromEuler(new THREE.Euler(0.15, 0, 0));
                    state.targetCollapse = 1.0;
                }
            }
        });

        const cameraUtils = new Camera(els.video, {
            onFrame: async () => { if (controlMode === 'auto') await hands.send({image: els.video}); },
            width: 640, height: 480
        });

        els.status.innerText = "Preparando esencia... (Iniciando cámara)";
        cameraUtils.start().then(() => {
            setTimeout(() => { if (controlMode === 'auto' && !state.handDetected) els.status.innerText = "Abre tu palma frente a la cámara..."; }, 3000);
        }).catch(() => { activateManualMode("Controles activados (Sin cámara)"); });
    </script>
</body>
</html>
