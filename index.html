<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Tulipán para Ti</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050005; 
            font-family: 'Consolas', monospace; 
            color: #fff;
        }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute; 
            top: 30px; 
            left: 30px; 
            z-index: 10;
            color: rgba(255, 150, 200, 0.8); 
            pointer-events: none;
        }
        h1 { 
            margin: 0; 
            font-size: 1.2rem; 
            letter-spacing: 3px; 
            border-bottom: 1px solid rgba(255, 150, 200, 0.3); 
            padding-bottom: 8px; 
            display: inline-block;
            font-weight: normal;
        }
        .status { 
            font-size: 0.85rem; 
            margin-top: 10px; 
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Recuadro de cámara visible y estilizado */
        #input_video {
            position: absolute; 
            bottom: 30px; 
            right: 30px;
            width: 160px; 
            height: 120px;
            z-index: 2; 
            border-radius: 12px;
            transform: scaleX(-1);
            border: 2px solid rgba(255, 150, 200, 0.3); 
            opacity: 0.5;
            transition: opacity 0.3s, box-shadow 0.3s;
            box-shadow: 0 0 15px rgba(255, 100, 150, 0.2);
            object-fit: cover;
        }
        #input_video:hover { 
            opacity: 1; 
            box-shadow: 0 0 20px rgba(255, 100, 150, 0.5);
        }

        /* Controles Manuales Lindos */
        #manual-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(20, 0, 15, 0.8);
            padding: 15px 25px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 150, 200, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 80%;
            max-width: 350px;
            opacity: 0;
            transition: opacity 1s ease;
        }
        #manual-controls.show {
            display: flex;
            opacity: 1;
        }
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8rem;
            letter-spacing: 1px;
            font-family: 'SF Pro Display', 'Helvetica Neue', sans-serif;
        }
        .control-group label { width: 80px; text-align: right; margin-right: 15px;}
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer;
            background: rgba(255, 150, 200, 0.2);
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 16px; width: 16px; border-radius: 50%;
            background: #ff96c8;
            cursor: pointer; -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(255, 100, 150, 0.8);
            transition: background 0.2s;
        }
        input[type=range]::-webkit-slider-thumb:hover { background: #fff; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>UN TULIPÁN DIGITAL</h1>
        <div class="status" id="status-text">Iniciando sistema mágico...</div>
    </div>

    <video id="input_video" autoplay playsinline></video>

    <div id="manual-controls">
        <div class="control-group">
            <label>Girar</label>
            <input type="range" id="slider-rot" min="-3.14" max="3.14" step="0.01" value="0">
        </div>
        <div class="control-group">
            <label>Iz q | Der</label>
            <input type="range" id="slider-x" min="-30" max="30" step="0.1" value="0">
        </div>
        <div class="control-group">
            <label>Abajo | Arriba</label>
            <input type="range" id="slider-y" min="-20" max="20" step="0.1" value="0">
        </div>
    </div>

    <script id="vertexShader" type="x-shader/x-vertex">
        attribute float aSize;
        varying vec3 vPos;

        void main() {
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            gl_PointSize = (4.0 * aSize) * (50.0 / -mvPosition.z);
            vPos = position; 
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vPos;
        
        void main() {
            vec2 coord = gl_PointCoord - vec2(0.5);
            float dist = length(coord);
            if(dist > 0.5) discard; 

            vec3 color;

            if (vPos.y < 0.0 && length(vPos.xz) < 5.0) {
                color = vec3(0.2, 0.8, 0.3);
            } else if (vPos.y >= 0.0 && vPos.y <= 18.0 && length(vPos.xz) < 15.0) {
                float h = vPos.y / 18.0; 
                vec3 baseColor = vec3(1.0, 0.1, 0.4); 
                vec3 topColor = vec3(1.0, 0.6, 0.8);  
                color = mix(baseColor, topColor, h);
            } else {
                color = vec3(1.0, 0.9, 0.7);
            }

            float strength = 1.0 - (dist * 2.0);
            strength = pow(strength, 1.5);

            gl_FragColor = vec4(color, strength * 0.85);
        }
    </script>

    <script>
        // --- ESTADO Y CONTROL ---
        let controlMode = 'auto'; 
        const els = {
            status: document.getElementById('status-text'),
            manual: document.getElementById('manual-controls'),
            video: document.getElementById('input_video'),
            sliderRot: document.getElementById('slider-rot'),
            sliderX: document.getElementById('slider-x'),
            sliderY: document.getElementById('slider-y')
        };

        const state = {
            targetPos: new THREE.Vector3(0, 0, 0),
            currentPos: new THREE.Vector3(0, 0, 0),
            targetRotY: 0,
            currentRotY: 0,
            handDetected: false,
            lerpSpeed: 0.05
        };

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050005, 0.008);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 65;
        camera.position.y = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- CONSTRUCCIÓN DEL TULIPÁN ORIGINAL ---
        const geometry = new THREE.BufferGeometry();
        const positions = [];
        const sizes = [];

        // 1. Tallo
        for(let i = 0; i < 5000; i++) {
            let t = Math.random();
            let y = -25 + 25 * t; 
            let angle = Math.random() * Math.PI * 2;
            let r = 0.5 + Math.random() * 0.2;
            positions.push(r * Math.cos(angle), y, r * Math.sin(angle));
            sizes.push(0.3 + Math.random() * 0.5);
        }

        // 2. Copa (Capullo)
        for(let i = 0; i < 30000; i++) {
            let h = Math.random(); 
            let theta = Math.random() * Math.PI * 2;
            
            let rBase = 9 * Math.pow(h, 0.4) * (1.1 - h);
            let r = rBase * (1 + 0.15 * Math.sin(3 * theta));

            let x = r * Math.cos(theta);
            let z = r * Math.sin(theta);
            let y = h * 18; 
            
            x += (Math.random() - 0.5) * 0.6;
            y += (Math.random() - 0.5) * 0.6;
            z += (Math.random() - 0.5) * 0.6;

            positions.push(x, y, z);
            sizes.push(0.5 + Math.random() * 0.8);
        }

        // 3. Polvo Mágico
        for(let i = 0; i < 5000; i++) {
            let r = 15 + Math.random() * 25; 
            let theta = Math.random() * Math.PI * 2;
            let phi = Math.acos(Math.random() * 2 - 1);
            
            let x = r * Math.sin(phi) * Math.cos(theta);
            let y = r * Math.sin(phi) * Math.sin(theta) - 5; 
            let z = r * Math.cos(phi);
            
            positions.push(x, y, z);
            sizes.push(Math.random() * 0.6);
        }

        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute('aSize', new THREE.Float32BufferAttribute(sizes, 1));

        const material = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const tulip = new THREE.Points(geometry, material);
        tulip.rotation.x = 0.15; 
        scene.add(tulip);

        // --- ANIMACIÓN FLUIDA ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Seguimiento suave
            state.currentPos.lerp(state.targetPos, state.lerpSpeed);
            tulip.position.copy(state.currentPos);

            if (controlMode === 'auto') {
                state.currentRotY += 0.003; 
            } else {
                state.currentRotY = THREE.MathUtils.lerp(state.currentRotY, state.targetRotY, state.lerpSpeed * 2);
            }
            tulip.rotation.y = state.currentRotY;
            
            // Flotación constante
            tulip.position.y += Math.sin(time * 0.8) * 1.5;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- LÓGICA DE INTERACCIÓN ---
        
        // Sliders
        els.sliderRot.addEventListener('input', (e) => { state.targetRotY = parseFloat(e.target.value); });
        els.sliderX.addEventListener('input', (e) => { state.targetPos.x = parseFloat(e.target.value); });
        els.sliderY.addEventListener('input', (e) => { state.targetPos.y = parseFloat(e.target.value); });

        function activateManualMode(message) {
            if (controlMode === 'manual') return;
            controlMode = 'manual';
            els.status.innerText = message;
            els.status.style.color = "rgba(255, 255, 255, 0.5)";
            
            els.video.style.display = 'none'; // Ocultar recuadro si falla la cámara
            els.manual.classList.add('show');
            
            state.targetPos.set(0, 0, 0);
            state.targetRotY = state.currentRotY; 
        }

        // MediaPipe Hands
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1, 
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            if (controlMode === 'manual') {
                controlMode = 'auto';
                els.manual.classList.remove('show');
                els.video.style.display = 'block';
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];

                if(!state.handDetected) {
                    state.handDetected = true;
                    els.status.innerText = "Conexión mágica establecida";
                    els.status.style.color = "#ff96c8";
                    state.lerpSpeed = 0.08; 
                }

                // Mapeo de la mano al espacio 3D
                let targetX = (0.5 - lm[9].x) * 60; 
                let targetY = (0.5 - lm[9].y) * 45;

                state.targetPos.x = THREE.MathUtils.clamp(targetX, -35, 35);
                state.targetPos.y = THREE.MathUtils.clamp(targetY, -25, 25);

            } else {
                if(state.handDetected) {
                    state.handDetected = false;
                    els.status.innerText = "Buscando tu mano...";
                    els.status.style.color = "rgba(255, 255, 255, 0.6)";
                    state.lerpSpeed = 0.02; 
                    state.targetPos.set(0, 0, 0);
                }
            }
        });

        // Inicialización de Cámara
        const cameraUtils = new Camera(els.video, {
            onFrame: async () => {
                if (controlMode === 'auto') {
                    await hands.send({image: els.video});
                }
            },
            width: 640, height: 480
        });

        els.status.innerText = "Para la persona más especial. (Iniciando cámara...)";
        
        cameraUtils.start()
            .then(() => {
                setTimeout(() => {
                    if (controlMode === 'auto' && !state.handDetected) {
                         els.status.innerText = "Cámara lista. Mueve tu mano para interactuar.";
                    }
                }, 3000);
            })
            .catch((err) => {
                activateManualMode("Controles táctiles activados (Sin cámara)");
            });

        // Fallback si la cámara no da imagen en 4 segundos
        setTimeout(() => {
            if (controlMode === 'auto' && !state.handDetected && els.video.readyState < 2) {
                activateManualMode("Usa los controles inferiores para moverlo");
            }
        }, 4000);

    </script>
</body>
</html>
